# Production stack: backend (.NET 10) + frontend (nginx) + persistent SQLite volume.
#
# Quick start:
#   cp .env.example .env       # then edit JWT_SECRET, SMTP creds, etc.
#   docker compose up -d --build
#
# Open http://localhost:8080 — the web container proxies /api and /hubs to the api container.
#
# To switch the DB to SQL Server, set Database__Provider=SqlServer and ConnectionStrings__Default
# via .env, then add a sqlserver service to this file.

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crm-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      # ---- Database (defaults to SQLite on a named volume)
      Database__Provider: ${DATABASE_PROVIDER:-Sqlite}
      ConnectionStrings__Default: ${CONNECTION_STRING:-Data Source=/data/crm.db}
      # ---- JWT (must be set in .env)
      Jwt__Secret: ${JWT_SECRET:?JWT_SECRET is required}
      Jwt__Issuer: ${JWT_ISSUER:-CRM}
      Jwt__Audience: ${JWT_AUDIENCE:-CRM}
      Jwt__AccessTokenMinutes: ${JWT_ACCESS_MINUTES:-15}
      Jwt__RefreshTokenDays: ${JWT_REFRESH_DAYS:-7}
      # ---- CORS — only the public app URL is allowed.
      Cors__Origins__0: ${APP_URL:-http://localhost:8080}
      # ---- Email (Brevo, Gmail, SES, etc.)
      Integrations__Email__Provider: ${EMAIL_PROVIDER:-Smtp}
      Integrations__Email__SmtpHost: ${SMTP_HOST:-}
      Integrations__Email__SmtpPort: ${SMTP_PORT:-465}
      Integrations__Email__Username: ${SMTP_USERNAME:-}
      Integrations__Email__Password: ${SMTP_PASSWORD:-}
      Integrations__Email__FromAddress: ${EMAIL_FROM:-no-reply@crm.local}
      Integrations__Email__FromName: ${EMAIL_FROM_NAME:-Rock Communication CRM}
      Integrations__Email__AppUrl: ${APP_URL:-http://localhost:8080}
      Integrations__Email__SupportEmail: ${SUPPORT_EMAIL:-support@crm.local}
      # ---- Optional vendors (leave blank for stubs)
      Integrations__Sms__Provider: ${SMS_PROVIDER:-Stub}
      Integrations__Sms__ApiKey: ${SMS_API_KEY:-}
      Integrations__Sms__FromNumber: ${SMS_FROM:-}
      Ai__Provider: ${AI_PROVIDER:-Stub}
      Ai__ApiKey: ${AI_API_KEY:-}
      Ai__Model: ${AI_MODEL:-gpt-4o-mini}
    volumes:
      - crm_data:/data
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8080 && printf 'GET /health HTTP/1.0\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q 200"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s
    expose:
      - "8080"

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Endpoint paths in the code are already prefixed with /api,
        # so leave the base empty (same-origin → nginx proxies /api → api service).
        VITE_API_URL: ""
    container_name: crm-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-8080}:8080"

volumes:
  crm_data:
